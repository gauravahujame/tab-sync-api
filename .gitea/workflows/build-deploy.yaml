name: Build and Deploy

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ${{ github.server_url }}
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      registry_address: ${{ steps.registry_setup.outputs.registry_address }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Registry URL
        id: registry_setup
        run: |
          RAW_URL="${{ github.server_url }}"

          # Strip protocol (http:// or https://)
          CLEAN_URL=$(echo "$RAW_URL" | sed -E 's|^https?://||')

          # If host is 'gitea', we should use the actual container name 'gitea' or the external domain
          # We will just depend on the default CLEAN_URL which is gitea:3000
          # Or if needed we can route to host.docker.internal, but typically gitea is correct on custom networks.

          echo "Registry Address: $CLEAN_URL"
          echo "registry_address=$CLEAN_URL" >> "$GITHUB_OUTPUT"
          echo "REGISTRY=$CLEAN_URL" >> "$GITHUB_ENV"

      - name: Debug Registry Values
        run: |
          echo "Original URL: ${{ github.server_url }}"
          echo "Cleaned Registry: ${{ env.REGISTRY }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deploy to Homelab via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_IMAGE: ${{ needs.build-and-push.outputs.registry_address }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: TARGET_IMAGE
          script: |
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '~/docker/tab-sync-api' }}"

            echo "🚀 Deploying to $DEPLOY_DIR..."
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ -d ".git" ]; then
              echo "Pulling latest compose config..."
              git pull origin main || git pull origin master
            fi

            export IMAGE_NAME=$TARGET_IMAGE
            export TAG=latest

            echo "📥 Pulling new image: $TARGET_IMAGE"
            docker compose pull

            echo "🔄 Restarting service..."
            docker compose up -d --remove-orphans

            docker image prune -f

            echo "✅ Deployment complete!"
