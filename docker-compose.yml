# =============================================================================
# Tab-Sync-API Production Docker Compose
# =============================================================================
#
# QUICK START:
#   docker compose up -d              # Start in background
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop services
#
# REVERSE PROXY OPTIONS:
#   Option 1: Direct Access (default)
#     - Access API directly at http://YOUR_IP:3000 (or API_PORT)
#     - Suitable for testing or behind an external reverse proxy (Traefik, Caddy, etc.)
#
#   Option 2: Built-in Nginx Proxy
#     - docker compose --profile proxy up -d
#     - Provides SSL termination and caching
#     - Place certs in ./nginx/certs/ (cert.pem, key.pem)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main API Service
  # ---------------------------------------------------------------------------
  app:
    # Use prebuilt image from container registry
    # To build locally instead, uncomment the build section below
    image: tabium-api:${TAG:-latest}
    # build:
    #   context: .
    #   target: production
    #   dockerfile: Dockerfile
    container_name: tabium-api
    restart: unless-stopped

    # Port mapping
    # API_PORT: External port (default 3000)
    # The container always listens on port 3000 internally
    ports:
      - "${API_PORT:-3000}:3000"

    # Named volume for persistent data
    volumes:
      - tabium-data:/app/data

    # Environment configuration
    environment:
      NODE_ENV: production
      PORT: 3000
      # Bind to all interfaces so external reverse proxies can reach the service
      HOST: 0.0.0.0
      DOMAIN: ${DOMAIN:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_PATH: /app/data/tabs.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/data/logs
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-20m}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-30d}
      LOG_ERROR_MAX_FILES: ${LOG_ERROR_MAX_FILES:-60d}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
      TZ: ${TZ:-UTC}
      # PostgreSQL (optional)
      DB_TYPE: ${DB_TYPE:-sqlite}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-tabsync}

    # Health check configuration
    healthcheck:
      test: ["CMD", "/usr/local/bin/health-check.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - tabium-network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (optional - use with --profile proxy)
  # ---------------------------------------------------------------------------
  nginx:
    profiles:
      - proxy
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: tabium-nginx:${TAG:-latest}
    container_name: tabium-nginx
    restart: unless-stopped

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SSL_CERT_PATH:-./nginx/certs}:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx

    environment:
      - TZ=${TZ:-UTC}

    depends_on:
      app:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - tabium-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  tabium-data:
    driver: local
  nginx-logs:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  tabium-network:
    driver: bridge
